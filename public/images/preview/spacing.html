<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px; font-family: var(--font-sans); background: var(--bg-canvas); color: var(--fg-1); }
  .row { display:flex; gap:14px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background:var(--pulse-100); border-radius:8px; }
  .label { font-size:10px; font-family:var(--font-mono); color:var(--fg-3); }
  .name { font-size:10.5px; color:var(--fg-2); font-weight:600; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="width:4px;height:4px"></div><div class="name">1</div><div class="label">4px</div></div>
  <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="name">2</div><div class="label">8px</div></div>
  <div class="item"><div class="box" style="width:12px;height:12px"></div><div class="name">3</div><div class="label">12px</div></div>
  <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="name">4</div><div class="label">16px</div></div>
  <div class="item"><div class="box" style="width:20px;height:20px"></div><div class="name">5</div><div class="label">20px</div></div>
  <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="name">6</div><div class="label">24px</div></div>
  <div class="item"><div class="box" style="width:32px;height:32px"></div><div class="name">8</div><div class="label">32px</div></div>
  <div class="item"><div class="box" style="width:40px;height:40px"></div><div class="name">10</div><div class="label">40px</div></div>
  <div class="item"><div class="box" style="width:48px;height:48px"></div><div class="name">12</div><div class="label">48px</div></div>
  <div class="item"><div class="box" style="width:64px;height:64px"></div><div class="name">16</div><div class="label">64px</div></div>
</div>
</body>
</html>
