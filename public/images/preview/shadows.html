<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; font-family: var(--font-sans); background: var(--bg-canvas); color: var(--fg-1); }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap:14px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width:84px; height:60px; background:#fff; border-radius:14px; }
  .name { font-size:11px; font-weight:600; color:var(--fg-2); }
  .spec { font-family:var(--font-mono); font-size:9.5px; color:var(--fg-3); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="name">xs</div><div class="spec">subtle</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">sm</div><div class="spec">cards rest</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="name">md</div><div class="spec">cards lift</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="name">lg</div><div class="spec">overlays</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-brand); background:var(--pulse-600)"></div><div class="name">brand</div><div class="spec">CTA glow</div></div>
</div>
</body>
</html>
