<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<title>OccuBase · İş yeri hekimliği</title>
<link rel="icon" href="../../assets/favicon.svg"/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="Layout.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Library.jsx"></script>
<script type="text/babel" src="Assessment.jsx"></script>
<script type="text/babel" src="SettingsLogin.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const [authed, setAuthed] = useState(false);
  const [route, setRoute] = useState('dashboard');
  const [libraryCategory, setLibraryCategory] = useState(null);

  function nav(r, arg) {
    setRoute(r);
    if (r === 'library' && arg) setLibraryCategory(arg);
    else if (r === 'library') setLibraryCategory(null);
  }

  if (!authed) return <Login onLogin={() => setAuthed(true)}/>;

  return (
    <div className="app" data-screen-label={'app — ' + route}>
      <Sidebar active={route} onNav={nav} onLogout={() => setAuthed(false)} email="hekim@occubase.app"/>
      <main className="main">
        {route === 'dashboard'  && <Dashboard onNav={nav}/>}
        {route === 'library'    && <Library initialCategory={libraryCategory}/>}
        {route === 'assessment' && <Assessment/>}
        {route === 'settings'   && <Settings/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
