<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; font-family: var(--font-sans); background: var(--bg-canvas); color: var(--fg-1); }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
  .tile { border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:12px; border:1px solid; }
  .dot { width:12px; height:12px; border-radius:99px; flex-shrink:0; }
  .meta { display:flex; flex-direction:column; gap:2px; min-width:0; }
  .label { font-size:12px; font-weight:600; }
  .hex { font-family:var(--font-mono); font-size:10.5px; opacity:0.7; }
</style>
</head>
<body>
<div class="row">
  <div class="tile" style="background:var(--ok-50); border-color:var(--ok-100); color:var(--ok-700);">
    <span class="dot" style="background:var(--ok-500)"></span>
    <div class="meta"><div class="label">Tam Uygun · OK</div><div class="hex">#10B981 · ok-500</div></div>
  </div>
  <div class="tile" style="background:var(--warn-50); border-color:var(--warn-100); color:var(--warn-700);">
    <span class="dot" style="background:var(--warn-500)"></span>
    <div class="meta"><div class="label">Değerlendir · Warn</div><div class="hex">#F59E0B · warn-500</div></div>
  </div>
  <div class="tile" style="background:var(--risk-50); border-color:var(--risk-100); color:var(--risk-700);">
    <span class="dot" style="background:var(--risk-500)"></span>
    <div class="meta"><div class="label">Kısıtlı · Risk</div><div class="hex">#EF4444 · risk-500</div></div>
  </div>
  <div class="tile" style="background:var(--info-50); border-color:var(--info-100); color:var(--info-700);">
    <span class="dot" style="background:var(--info-500)"></span>
    <div class="meta"><div class="label">Bilgi · Info</div><div class="hex">#3B82F6 · info-500</div></div>
  </div>
</div>
</body>
</html>
