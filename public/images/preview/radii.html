<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px; font-family: var(--font-sans); background: var(--bg-canvas); color: var(--fg-1); }
  .row { display:flex; gap:12px; align-items:center; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:64px; height:64px; background:linear-gradient(135deg, var(--pulse-100), var(--pulse-200)); border:1px solid var(--pulse-200); }
  .label { font-size:10px; font-family:var(--font-mono); color:var(--fg-3); }
  .name { font-size:10.5px; color:var(--fg-2); font-weight:600; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">xs</div><div class="label">4px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">sm</div><div class="label">8px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">md</div><div class="label">12px</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">lg</div><div class="label">16px</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="name">xl</div><div class="label">20px</div></div>
  <div class="item"><div class="box" style="border-radius:28px"></div><div class="name">2xl</div><div class="label">28px · cards</div></div>
  <div class="item"><div class="box" style="border-radius:9999px"></div><div class="name">pill</div><div class="label">full</div></div>
</div>
</body>
</html>
