<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:22px; font-family: var(--font-sans); background: var(--bg-canvas); color: var(--fg-1); }
  .row { display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  .mark { width:72px; height:72px; }
  .lockup { height:64px; }
  .ink-on-bg {
    display:flex; align-items:center; gap:12px;
    background:var(--ink-900); padding:12px 18px; border-radius:16px; color:#fff;
  }
  .ink-on-bg .name { font-family:var(--font-display); font-weight:700; letter-spacing:-0.01em; font-size:18px; }
  .ink-on-bg .sub { font-size:10px; letter-spacing:0.14em; color:#7eb8b3; text-transform:uppercase; font-weight:600; margin-top:2px; }
  .stack { display:flex; flex-direction:column; line-height:1.05; }
  .caption { font-size:10.5px; color:var(--fg-3); margin-top:6px; letter-spacing:0.05em; text-transform:uppercase; font-weight:600; }
</style>
</head>
<body>
<div class="row">
  <div>
    <img class="mark" src="../assets/logo-mark.svg" alt="OccuBase işareti"/>
    <div class="caption">Mark</div>
  </div>
  <div>
    <img class="lockup" src="../assets/logo-lockup.svg" alt="OccuBase lockup"/>
    <div class="caption">Lockup · İş Yeri Hekimliği</div>
  </div>
  <div>
    <div class="ink-on-bg">
      <img src="../assets/logo-mark.svg" width="36" height="36" alt=""/>
      <div class="stack">
        <span class="name">OccuBase</span>
        <span class="sub">İş yeri hekimliği</span>
      </div>
    </div>
    <div class="caption">Koyu zemin</div>
  </div>
</div>
</body>
</html>
